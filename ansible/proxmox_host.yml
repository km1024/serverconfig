---
- name: Configure Proxmox 9 Host Hygiene
  hosts: proxmox
  become: true
  
  tasks:
    - name: Remove Proxmox and Ceph Enterprise repositories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/pve-enterprise.list
        - /etc/apt/sources.list.d/pve-no-subscription.list
        - /etc/apt/sources.list.d/pve-enterprise.sources
        - /etc/apt/sources.list.d/ceph.list
        - /etc/apt/sources.list.d/ceph.sources

    - name: Configure Proxmox No-Subscription repository (deb822)
      ansible.builtin.deb822_repository:
        name: pve-no-subscription
        types: [deb]
        uris: ["http://download.proxmox.com/debian/pve"]
        suites: ["trixie"]
        components: ["pve-no-subscription"]
        signed_by: "/etc/apt/trusted.gpg.d/proxmox-release-trixie.gpg"
        state: present

    - name: Configure Ceph No-Subscription repository (deb822)
      ansible.builtin.deb822_repository:
        name: ceph
        types: [deb]
        uris: ["http://download.proxmox.com/debian/ceph-squid"]
        suites: ["trixie"]
        components: ["no-subscription"]
        signed_by: "/etc/apt/trusted.gpg.d/proxmox-release-trixie.gpg"
        state: present

    - name: Update apt cache and run full system upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true

    - name: Silence the Proxmox subscription nag screen
      ansible.builtin.replace:
        path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
        regexp: "data\\.status\\.toLowerCase\\(\\) !== 'active'"
        replace: "data.status.toLowerCase() === 'active'"
      notify: Restart pveproxy

  handlers:
    - name: Restart pveproxy
      ansible.builtin.systemd:
        name: pveproxy
        state: restarted

